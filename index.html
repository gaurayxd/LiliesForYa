<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title></title>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;1,400&family=Lato:wght@300;400&display=swap');

      html, body {
        height: 100%;
        margin: 0;
        padding: 0;
      }

      .card-wrap {
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        padding: 2rem 1rem;
        box-sizing: border-box;
      }

      .card {
        position: relative;
        width: 340px;
        background: #fdf6f0;
        border-radius: 24px;
        border: 1px solid #f0d9c8;
        padding: 2.5rem 2rem 2rem;
        overflow: hidden;
        text-align: center;
      }

      .card-bg-blob {
        position: absolute;
        top: -30px; right: -30px;
        width: 160px; height: 160px;
        background: #fce4ec;
        border-radius: 50%;
        opacity: 0.45;
        pointer-events: none;
      }

      .card-bg-blob2 {
        position: absolute;
        bottom: -20px; left: -20px;
        width: 120px; height: 120px;
        background: #e8f5e9;
        border-radius: 50%;
        opacity: 0.5;
        pointer-events: none;
      }

      .lily-art { display: block; margin: 0 auto 1.4rem; }

      .card-title {
        font-family: 'Playfair Display', Georgia, serif;
        font-style: italic;
        font-size: 22px;
        font-weight: 400;
        color: #5a3e36;
        margin: 0 0 0.5rem;
      }

      .card-sub {
        font-family: 'Lato', sans-serif;
        font-weight: 300;
        font-size: 12px;
        color: #9e7a6b;
        letter-spacing: 0.14em;
        text-transform: uppercase;
        margin: 0 0 1.2rem;
      }

      .divider {
        width: 48px; height: 1px;
        background: #e2b8a4;
        margin: 0 auto 1.3rem;
      }

      .card-message {
        font-family: 'Playfair Display', Georgia, serif;
        font-size: 15px;
        color: #6b4c43;
        line-height: 1.8;
        margin: 0 0 1.6rem;
      }

      .card-name {
        font-family: 'Lato', sans-serif;
        font-size: 11px;
        font-weight: 400;
        letter-spacing: 0.2em;
        color: #b08a7c;
        text-transform: uppercase;
      }
    </style>
  </head>
